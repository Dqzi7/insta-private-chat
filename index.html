<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساحة الآمنة - Direct</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        :root {
            --ig-bg: #fafafa;
            --ig-border: #dbdbdb;
            --ig-primary: #0095f6;
            --ig-danger: #ed4956;
            --ig-secondary: #8e8e8e;
        }

        body {
            font-family: 'Cairo', Arial, sans-serif;
            background-color: var(--ig-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #262626;
        }

        /* حاوية تشبه إنستغرام */
        .ig-card {
            background: #fff;
            border: 1px solid var(--ig-border);
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .ig-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 20px;
            border-bottom: 1px solid var(--ig-border);
        }

        .ig-logo {
            font-size: 32px;
            font-weight: bold;
            font-family: cursive;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .ig-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--ig-secondary);
            margin-bottom: 20px;
        }

        .ig-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ig-input {
            width: 100%;
            padding: 12px;
            background: #fafafa;
            border: 1px solid var(--ig-border);
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .ig-input:focus {
            border-color: var(--ig-secondary);
        }

        .ig-btn {
            background-color: var(--ig-primary);
            color: white;
            padding: 10px 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            font-family: 'Cairo', Arial, sans-serif;
        }

        .ig-btn:hover {
            background-color: #1877f2;
        }

        /* غرفة المحادثة */
        #chat-room {
            display: none;
            height: 580px;
            display: flex;
            flex-direction: column;
        }

        .chat-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--ig-border);
            font-weight: 700;
            font-size: 16px;
        }

        .messages-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
            position: relative;
        }

        /* تصميم رسائل شبيه بـ Instagram Direct */
        .msg-outgoing {
            background: var(--ig-primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-incoming {
            background: #efefef;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 3px;
            opacity: 0.85;
            display: block;
        }

        .msg-media {
            max-width: 100%;
            max-height: 180px;
            border-radius: 12px;
            display: block;
            margin-top: 4px;
        }

        .msg-audio {
            width: 200px;
            height: 35px;
            margin-top: 4px;
            display: block;
        }

        .chat-inputbar {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid var(--ig-border);
            background: #fafafa;
        }

        .chat-inputbar input {
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            font-family: 'Cairo', Arial, sans-serif;
        }

        .action-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            color: var(--ig-primary);
        }

        .action-icon.record-on {
            color: var(--ig-danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .admin-section {
            border-top: 1px solid var(--ig-border);
            padding: 12px 16px;
            background: #fff;
            display: none;
        }

        .admin-section input {
            padding: 6px;
            font-size: 12px;
            margin-bottom: 6px;
            border: 1px solid var(--ig-border);
            border-radius: 3px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-success { background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%; font-family: 'Cairo', sans-serif; margin-bottom: 6px;}
        .btn-danger { background-color: var(--ig-danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%; font-family: 'Cairo', sans-serif;}
        .btn-secondary { background-color: var(--ig-secondary); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; width: 100%; font-family: 'Cairo', sans-serif; margin-top: 8px;}
    </style>
</head>
<body>

    <div class="ig-card">
        <div id="login-card" class="ig-header">
            <div class="ig-logo">Instagram</div>
            <div class="ig-title">المساحة السرية المباشرة 💬</div>
            <div class="ig-form">
                <input type="text" id="username" class="ig-input" placeholder="اسم المستخدم (هاتف، أو اسم مستخدم)">
                <input type="password" id="password" class="ig-input" placeholder="كلمة المرور">
                <button class="ig-btn" onclick="login()">تسجيل الدخول</button>
            </div>
        </div>

        <div id="chat-room">
            <div class="chat-topbar">
                <span>المساحة السرية Direct 📌</span>
                <button class="action-icon" style="color:var(--ig-secondary); font-size: 14px;" onclick="logout()">خروج</button>
            </div>
            
            <div class="messages-area" id="messages"></div>
            
            <div class="chat-inputbar">
                <button class="action-icon" onclick="document.getElementById('media-file').click()">🖼️</button>
                <input type="file" id="media-file" accept="image/*,video/*" style="display: none;" onchange="handleMediaUpload(event)">
                
                <button id="record-btn" class="action-icon" onclick="toggleRecording()">🎤</button>
                
                <input type="text" id="msg-input" placeholder="رسالة..." onkeydown="if(event.key === 'Enter') sendMessage()">
                
                <button class="action-icon" style="font-size: 14px; font-weight: bold;" onclick="sendMessage()">إرسال</button>
            </div>

            <div id="admin-section" class="admin-section">
                <div style="font-size:12px; font-weight:bold; margin-bottom:6px; color:var(--ig-secondary);">🛡️ لوحة التحكم</div>
                <input type="text" id="new-user" placeholder="اسم المستخدم الجديد">
                <input type="password" id="new-pass" placeholder="كلمة المرور الجديدة">
                <button class="btn-success" onclick="addUser()">➕ إضافة مستخدم</button>
                
                <input type="text" id="del-user" placeholder="اسم المستخدم للحذف">
                <button class="btn-danger" onclick="deleteUser()">🗑️ حذف مستخدم</button>
            </div>
            
            <div id="logout-btn" style="padding: 0 16px 10px; background: #fff; display: none;">
                <button class="btn-secondary" onclick="logout()">تسجيل الخروج</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // تم تحديث الرابط هنا ليتصل بعنوان موقعك على Render مباشرة ويمنع أي خطأ اتصال
        const serverUrl = 'https://insta-private-chat.onrender.com';
        
        const socket = io(serverUrl);
        
        let currentUser = "";
        let mediaRecorder;
        let audioChunks = [];

        async function loadMessages() {
            try {
                const response = await fetch(`${serverUrl}/api/messages`);
                const messages = await response.json();
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                messages.forEach(msg => appendMessage(msg));
            } catch (err) {
                console.log("خطأ في جلب الرسائل:", err);
            }
        }

        async function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(!user || !pass) {
                return alert("الرجاء إدخال اسم المستخدم وكلمة المرور");
            }

            try {
                const response = await fetch(`${serverUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await response.json();

                if(data.success) {
                    currentUser = user;
                    document.getElementById('login-card').style.display = 'none';
                    document.getElementById('chat-room').style.display = 'flex';
                    await loadMessages();
                    
                    // إظهار لوحة التحكم للمستخدم الأساسي داود أو الأدمن
                    if(user.toLowerCase() === 'dawood' || user.toLowerCase() === 'admin') {
                        document.getElementById('admin-section').style.display = 'block';
                    } else {
                        document.getElementById('logout-btn').style.display = 'block';
                    }
                } else {
                    alert(data.message);
                }
            } catch(e) {
                alert("حدث خطأ أثناء الاتصال بالسيرفر");
            }
        }

        async function addUser() {
            const user = document.getElementById('new-user').value.trim();
            const pass = document.getElementById('new-pass').value.trim();
            if(!user || !pass) return alert("الرجاء تعبئة الحقول الخاصة بالمستخدم الجديد");
            
            try {
                const response = await fetch(`${serverUrl}/api/users/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await response.json();
                alert(data.message);
                document.getElementById('new-user').value = '';
                document.getElementById('new-pass').value = '';
            } catch(e) {
                alert("خطأ في إضافة المستخدم");
            }
        }

        async function deleteUser() {
            const user = document.getElementById('del-user').value.trim();
            if(!user) return alert("الرجاء كتابة اسم المستخدم المراد حذفه");
            
            try {
                const response = await fetch(`${serverUrl}/api/users/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user })
                });
                const data = await response.json();
                alert(data.message);
                document.getElementById('del-user').value = '';
            } catch(e) {
                alert("خطأ في حذف المستخدم");
            }
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                socket.emit('chat message', { type: 'text', sender: currentUser, content: input.value });
                input.value = '';
            }
        }

        function handleMediaUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const fileType = file.type.startsWith('video') ? 'video' : 'image';
                    socket.emit('chat message', { type: fileType, sender: currentUser, content: e.target.result });
                };
                reader.readAsDataURL(file);
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('record-btn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            socket.emit('chat message', { type: 'audio', sender: currentUser, content: reader.result });
                        };
                    };

                    mediaRecorder.start();
                    btn.classList.add('record-on');
                    btn.textContent = "⏹️";
                } catch(err) {
                    alert("يجب السماح بالوصول إلى الميكروفون لتتمكن من التسجيل.");
                }
            } else {
                mediaRecorder.stop();
                btn.classList.remove('record-on');
                btn.textContent = "🎤";
            }
        }

        function appendMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const bubble = document.createElement('div');
            
            // تحديد اتجاه ظهور الرسالة (يمين للمرسل، يسار للمستقبل)
            const isMe = msg.sender === currentUser;
            bubble.className = `msg-bubble ${isMe ? 'msg-outgoing' : 'msg-incoming'}`;
            
            let contentHtml = `<span class="msg-sender">${msg.sender}</span>`;
            
            if (msg.type === 'text') {
                contentHtml += `<span>${msg.content}</span>`;
            } else if (msg.type === 'image') {
                contentHtml += `<img src="${msg.content}" class="msg-media">`;
            } else if (msg.type === 'video') {
                contentHtml += `<video src="${msg.content}" class="msg-media" controls></video>`;
            } else if (msg.type === 'audio') {
                contentHtml += `<audio src="${msg.content}" class="msg-audio" controls></audio>`;
            }

            bubble.innerHTML = contentHtml;
            messagesDiv.appendChild(bubble);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        socket.on('chat message', (msg) => {
            appendMessage(msg);
        });

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
